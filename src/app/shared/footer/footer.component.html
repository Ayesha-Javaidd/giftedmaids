<footer class="w-full border-t py-12 bg-black text-gray-800 mt-8 font-poppins">
  <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-10">
    <div class="flex items-center gap-3">
      <img [src]="logoPreview" alt="System Logo" class="w-28" />
      <span class="font-semibold text-white text-xl">{{ brand.name }}</span>
    </div>

    <div>
      <ul class="space-y-2 text-white">
        <li *ngFor="let link of menuLinks">
          <a
            [routerLink]="link.path"
            class="text-gray-300 hover:text-white transition-colors duration-300"
          >
            {{ link.label }}
          </a>
        </li>
      </ul>
    </div>

    <div class="space-y-3 text-sm">
      <div class="flex items-center gap-2 text-white">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.25 4.5l3.75 1 1 4.5L7 14l5 5 3.5-2 4.5 1 .75-1.5-2-3.5 3-3.5-3-3.5-3.5 2-3.5-1-1-4.5z"
          />
        </svg>
        <span>{{ phone }}</span>
      </div>

      <div class="flex items-center gap-2 text-white">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16 12H8m0 0l4-4m-4 4l4 4m4-4a8 8 0 11-16 0 8 8 0 0116 0z"
          />
        </svg>
        <span>{{ email }}</span>
      </div>
    </div>
  </div>

  <div class="text-center text-xs text-white mt-10">
    © 2024 {{ brand.name }}. All rights reserved.
  </div>
</footer>
