<nav
  class="w-full fixed top-0 z-50 bg-black text-white flex items-center justify-between p-10 h-20"
>
  <div class="flex items-center gap-3 cursor-pointer select-none">
    <img
      [src]="logoPreview"
      alt="System Logo"
      class="w-28"
    />

    <span class="font-semibold text-xl tracking-wide font-poppins">
      Giftedmaids
    </span>
  </div>

  <ul class="hidden md:flex space-x-10 tracking-wide">
    <li *ngFor="let link of navLinks">
      <a [routerLink]="link.path" class="hover:text-white/80 transition">
        {{ link.label }}
      </a>
    </li>
  </ul>

  <div
    class="hidden md:flex items-center bg-white text-black px-2 p-1 rounded-lg"
  >
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (keyup.enter)="onSearch()"
      class="bg-transparent outline-none text-sm w-40 placeholder-black/60"
      placeholder="Search..."
    />

    <button
      (click)="onSearch()"
      class="ml-1 text-xl font-semibold hover:opacity-80 transition"
    >
      ⌕
    </button>
  </div>

  <a
    [routerLink]="ctaButton.path"
    class="hidden md:inline-block bg-white text-black px-5 py-1.5 rounded-full font-semibold text-sm hover:opacity-90 transition"
  >
    {{ ctaButton.label }}
  </a>

  <!-- Mobile Toggle -->
  <button (click)="toggleMenu()" class="md:hidden focus:outline-none">
    <svg *ngIf="!isMenuOpen" >...</svg>
    <svg *ngIf="isMenuOpen">...</svg>
  </button>
</nav>
