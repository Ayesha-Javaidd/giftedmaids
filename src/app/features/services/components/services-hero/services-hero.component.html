<section class="py-16 mt-18 bg-black font-poppins text-center">
  <h2 class="text-4xl text-yellow-500 font-bold tracking-wide mb-6">
    Our Services
  </h2>

  <p class="max-w-3xl mx-auto text-yellow-100 mb-12 text-sm leading-relaxed">
    This is your Services Page. It's a great opportunity to provide information
    about the services you offer. You can edit this section to highlight the
    benefits of each service, what it includes, and why customers should choose
    your agency.
  </p>

  <div
    class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-10 px-6"
  >
    <div
      *ngFor="let service of services"
      class="p-8 bg-gray-600/40 border border-yellow-500/40 rounded-2xl shadow-md hover:shadow-yellow-500/20 hover:-translate-y-1 transition-all duration-300"
    >
      <h3 class="text-xl text-yellow-500 font-semibold mb-3">
        {{ service.title }}
      </h3>
      <p class="text-sm text-yellow-50 leading-relaxed">
        {{ service.description }}
      </p>
    </div>
  </div>
</section>
